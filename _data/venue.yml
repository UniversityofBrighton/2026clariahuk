# Practical info blocks shown beside the map.
travel:
  - label: BY TRAIN
    text: Brighton station is a short walk from the campus, and direct trains connect the city with London and many south-coast towns.
  - label: BY AIR
    text: Gatwick is the most convenient airport for Brighton, with a direct rail link into the city; Heathrow is also reachable with a longer rail or coach journey.
  - label: BY BUS OR BIKE
    text: The campus sits in the city centre and is served by frequent buses, while Brighton’s cycle network and Beryl bikes make it easy to get around.
  - label: ACCOMMODATION
    text: Brighton is busy during the conference season, so it is wise to book accommodation early. The campus is close to the city centre, the seafront and many hotels.
